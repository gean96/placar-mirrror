<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar — Conectar Strava</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f19;
      color: #f3f4f6;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; color: #fbbf24; }
    p { color: #9ca3af; line-height: 1.5; margin: 0 0 16px; }
    a.btn {
      display: inline-block;
      background: linear-gradient(135deg, #fc4c02, #e34402);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 10px;
    }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Placar × Strava</h1>
    <p id="msg">Concluindo autorização…</p>
    <p><a class="btn" id="openApp" href="#">Abrir no Placar</a></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var err = params.get("error");
      var code = params.get("code");
      var scope = params.get("scope") || "";
      var state = params.get("state") || "";
      var msg = document.getElementById("msg");
      var link = document.getElementById("openApp");

      if (err) {
        msg.className = "err";
        msg.textContent = "Autorização cancelada ou negada (" + err + "). Você pode fechar esta página.";
        link.style.display = "none";
        return;
      }
      if (!code) {
        msg.className = "err";
        msg.textContent = "Código de autorização não encontrado. Feche e tente conectar de novo no app.";
        link.style.display = "none";
        return;
      }

      var deep =
        "placar://oauth?code=" + encodeURIComponent(code) +
        "&scope=" + encodeURIComponent(scope) +
        "&state=" + encodeURIComponent(state);
      link.href = deep;
      msg.textContent = "Autorização recebida. Tocando para voltar ao Placar…";
      // Auto-redirect into the app
      window.location.replace(deep);
    })();
  </script>
</body>
</html>
