<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Changelog do aplicativo Placar — histórico de versões e novidades.">
    <title>Changelog — Placar</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --primary-light: #6366f1;
            --accent-blue: #3b82f6;
            --accent-green: #34d399;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            background: rgba(8, 11, 17, 0.92);
            z-index: 100;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }

        .back-link {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .back-link:hover {
            text-decoration: underline;
        }

        main {
            padding: 3rem 0 5rem;
        }

        .page-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .changelog-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(8px);
        }

        .changelog-loading,
        .changelog-error {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .changelog-error {
            color: #f87171;
        }

        #changelog-content h1 {
            display: none;
        }

        #changelog-content h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        #changelog-content h2:first-of-type {
            margin-top: 0;
        }

        #changelog-content h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-green);
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        #changelog-content p,
        #changelog-content li {
            color: var(--text-secondary);
        }

        #changelog-content ul {
            margin: 0.5rem 0 1rem 1.25rem;
        }

        #changelog-content li {
            margin-bottom: 0.4rem;
        }

        #changelog-content strong {
            color: var(--text-primary);
        }

        #changelog-content code {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--accent-blue);
        }

        footer {
            padding: 2rem 0;
            border-top: 1px solid var(--card-border);
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        footer a {
            color: var(--accent-green);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">
                <img src="assets/icon.png" alt="" class="logo-img" width="36" height="36">
                Placar
            </a>
            <a href="index.html" class="back-link">← Voltar ao site</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Changelog</h1>
        <p class="page-subtitle">Histórico de versões e novidades do Placar.</p>

        <div class="changelog-card">
            <div id="changelog-content" class="changelog-loading">Carregando changelog…</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Placar · <a href="privacy.html">Privacidade</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var container = document.getElementById('changelog-content');
            fetch('changelog.md')
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('changelog.md não encontrado');
                    }
                    return response.text();
                })
                .then(function (markdown) {
                    container.className = '';
                    container.innerHTML = marked.parse(markdown);
                })
                .catch(function (err) {
                    container.className = 'changelog-error';
                    container.textContent = 'Não foi possível carregar o changelog. ' + err.message;
                });
        });
    </script>
</body>
</html>
